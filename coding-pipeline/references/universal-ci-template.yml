# Platform-neutral phase contract for CI systems without a dedicated reference.
# Translate this structure to the target platform; this file is not a runnable workflow.
version: 1
exclude:
  - .git
  - node_modules
  - .venv
  - vendor
  - target
  - build
  - dist
  - .cache
  - .pytest_cache
  - __pycache__
packages:
  - name: __PACKAGE__
    workdir: __WORKDIR__
    runtime: __PINNED_RUNTIME__
    dependency_source: __LOCKFILE_OR_MANIFEST__
    stages:
      preflight: __STATIC_OR_TOOLCHAIN_COMMAND__
      install: __REPRODUCIBLE_INSTALL_COMMAND__
      test: __TEST_COMMAND_WITH_REAL_EXIT_CODE__
      coverage: __COVERAGE_COMMAND_OR_UNKNOWN__
completion:
  require_each_package: true
  require_no_placeholders: true
  remote_success_only_if_observed: true
  external_integrations_require_authorization: true
