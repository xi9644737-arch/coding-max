# coding-pipeline: GitHub Actions CI 模板 (两阶段)
# 生成条件: 无已有CI → 默认生成此文件
# 用法: 复制到 .github/workflows/test.yml，按需修改 src_dir 和语言版本矩阵

name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ===== Python 模板 =====
# 替换整个 jobs 块为对应语言

jobs:
  # Phase1: 纯语法冒烟 (秒级，不装依赖)
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Phase1 — 语法+lint (不装依赖)
        run: |
          python -c "
          import ast, os
          src = 'app'
          errors = []
          for root, _, files in os.walk(src):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          tree = ast.parse(open(path).read())
                          for n in ast.walk(tree):
                              if isinstance(n, ast.ExceptHandler) and n.type is None:
                                  errors.append(f'裸except {path}:{n.lineno}')
                      except SyntaxError as e:
                          errors.append(f'语法错误 {path}:{e}')
          assert not errors, '\n'.join(errors)
          print('Phase1 通过')
          "

  # Phase2: 完整测试 (Phase1 通过后才跑)
  test:
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-${{ matrix.python-version }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Notify failure (Slack)
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "❌ Test failed: ${{ github.repository }} @ ${{ github.ref_name }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}

