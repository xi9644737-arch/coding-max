# REFERENCE_ONLY: replace every __TOKEN__ and duplicate matrix rows per package.
# Do not copy this file unchanged into a repository.
name: Test

on:
  push:
    branches: [__DEFAULT_BRANCH__]
  pull_request:
    branches: [__DEFAULT_BRANCH__]

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: __PACKAGE__
            workdir: __WORKDIR__
            setup: __SETUP_RUNTIME_COMMAND__
            static: __STATIC_COMMAND__
    steps:
      - uses: actions/checkout@v4
      - name: Setup runtime
        run: ${{ matrix.setup }}
      - name: Static or toolchain preflight
        working-directory: ${{ matrix.workdir }}
        run: ${{ matrix.static }}

  test:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: __PACKAGE__
            workdir: __WORKDIR__
            setup: __SETUP_RUNTIME_COMMAND__
            manifest: __LOCKFILE_OR_MANIFEST__
            cache-path: __CACHE_PATH__
            install: __INSTALL_COMMAND__
            test: __TEST_COMMAND_WITH_COVERAGE__
            coverage: __COVERAGE_FILE__
    steps:
      - uses: actions/checkout@v4
      - name: Setup runtime
        run: ${{ matrix.setup }}
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache-path }}
          key: deps-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(matrix.manifest) }}
      - name: Restore dependencies
        working-directory: ${{ matrix.workdir }}
        run: ${{ matrix.install }}
      - name: Run tests
        working-directory: ${{ matrix.workdir }}
        run: ${{ matrix.test }}
      - name: Upload coverage artifact
        if: ${{ matrix.coverage != '' && hashFiles(format('{0}/{1}', matrix.workdir, matrix.coverage)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.workdir }}/${{ matrix.coverage }}

# Adaptation rules:
# - Prefer setup-python/setup-node/setup-go/toolchain actions over shell setup where available.
# - Use one include row per Monorepo package; never hide a package failure.
# - Prefer lockfiles. With only a manifest, hash it and report non-locked dependency risk.
# - Use npm ci only when a tracked lockfile exists; do not use `npm ci || npm install`.
# - External Codecov/Slack steps require existing configuration or explicit authorization.
# - Validate the generated workflow and ensure no __TOKEN__ remains.
