# REFERENCE_ONLY: replace every __TOKEN__ and add one matrix row per package.
stages: [preflight, test]

preflight:
  stage: preflight
  image: __TOOLCHAIN_IMAGE__
  parallel:
    matrix:
      - PACKAGE: __PACKAGE__
        WORKDIR: __WORKDIR__
        STATIC_COMMAND: __STATIC_COMMAND__
  script:
    - cd "$WORKDIR"
    - eval "$STATIC_COMMAND"

test:
  stage: test
  needs: [preflight]
  image: __TOOLCHAIN_IMAGE__
  parallel:
    matrix:
      - PACKAGE: __PACKAGE__
        WORKDIR: __WORKDIR__
        MANIFEST: __LOCKFILE_OR_MANIFEST__
        INSTALL_COMMAND: __INSTALL_COMMAND__
        TEST_COMMAND: __TEST_COMMAND_WITH_COVERAGE__
        COVERAGE_FILE: __COVERAGE_FILE__
  cache:
    key:
      files: [__LOCKFILE_OR_MANIFEST__]
      prefix: "$PACKAGE"
    paths: [__CACHE_PATH__]
  script:
    - cd "$WORKDIR"
    - eval "$INSTALL_COMMAND"
    - eval "$TEST_COMMAND"
  artifacts:
    when: always
    paths: [__COVERAGE_FILE__]

# Adaptation rules:
# - Pin a real image per package/runtime; a declared matrix variable must control the image.
# - Prefer tracked lockfiles; otherwise bind cache to the manifest and report the risk.
# - Keep package jobs independent. Never mask install failure with a fallback command.
# - Add coverage_report only when the generated format and path are real.
# - Add Slack/other webhooks only with existing protected variables or explicit authorization.
# - Validate the generated YAML and ensure no __TOKEN__ remains.
