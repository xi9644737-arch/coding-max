# coding-pipeline: GitLab CI 模板 (两阶段)
# 生成条件: 用户指定或在项目中探测到 .gitlab-ci.yml
# 用法: 复制到项目根目录 .gitlab-ci.yml，按需修改 src_dir 和语言版本

stages:
  - smoke
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ===== Phase1: 纯语法冒烟 (秒级，不装依赖) =====

smoke:
  stage: smoke
  image: python:3.12-slim
  script:
    - |
      python -c "
      import ast, os
      src = 'app'
      errors = []
      for root, _, files in os.walk(src):
          for f in files:
              if f.endswith('.py'):
                  path = os.path.join(root, f)
                  try:
                      tree = ast.parse(open(path).read())
                      for n in ast.walk(tree):
                          if isinstance(n, ast.ExceptHandler) and n.type is None:
                              errors.append(f'裸except {path}:{n.lineno}')
                  except SyntaxError as e:
                      errors.append(f'语法错误 {path}:{e}')
      assert not errors, '\n'.join(errors)
      print('Phase1 通过')
      "

# ===== Phase2: 完整测试 (Phase1 通过后才跑) =====

test:
  stage: test
  needs: [smoke]
  image: python:3.12
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
    - pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing -v
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  after_script:
    - |
      # 失败通知 (Slack webhook — 可选，配置 SLACK_WEBHOOK_URL 变量激活)
      if [ "$CI_JOB_STATUS" != "success" ] && [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"❌ GitLab CI failed: ${CI_PROJECT_NAME} @ ${CI_COMMIT_REF_NAME}\n${CI_PIPELINE_URL}\"}" \
          $SLACK_WEBHOOK_URL
      fi

